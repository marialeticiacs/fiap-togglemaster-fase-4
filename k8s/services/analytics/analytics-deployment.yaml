apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: togglemaster
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      serviceAccountName: analytics-service-account
      containers:
      - name: analytics-service
        image: 236604670467.dkr.ecr.us-east-2.amazonaws.com/analytics-service:65062330177e73d377e421c26511f07ed60dbc43
        imagePullPolicy: Always
        ports:
        - containerPort: 8005
          name: http
        env:
        - name: AWS_DYNAMODB_TABLE
          value: "togglemaster-analytics"
        
        - name: AWS_SQS_URL
          value: "https://sqs.us-east-2.amazonaws.com/236604670467/analytics-queue"
        
        - name: AWS_REGION
          value: "us-east-2"
        
        # --- Configurações do OpenTelemetry ---
        - name: OTEL_SERVICE_NAME
          value: "analytics-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: togglemaster
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
  - port: 80
    targetPort: 8005
    protocol: TCP
    name: http