name: CI-CD-Evaluation-Service
on:
  push:
    branches: [ main ]
    paths: [ 'apps/evaluation-service/**' ]

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/evaluation-service/go.sum
          
      - name: Trivy SAST
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: './apps/evaluation-service'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
          
      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build & Tag
        run: |
          docker build -t evaluation-service:${{ github.sha }} ./apps/evaluation-service
          docker tag evaluation-service:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/evaluation-service:${{ github.sha }}
          
      # Escaneando a imagem com a tag de commit
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'evaluation-service:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL'
          
      # Enviando pro ECR com a tag de commit
      - name: Push Image
        run: docker push ${{ steps.login-ecr.outputs.registry }}/evaluation-service:${{ github.sha }}

      - name: Update GitOps Repo (ArgoCD)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Atualiza a tag no arquivo
          sed -i -E "s|(image: .*/evaluation-service:).*|\1${{ github.sha }}|g" k8s/services/evaluation/evaluation-deployment.yaml
          
          git add k8s/services/evaluation/evaluation-deployment.yaml
          git commit -m "GitOps: atualizando tag do evaluation-service para ${{ github.sha }}"
          git pull --rebase origin main
          git push