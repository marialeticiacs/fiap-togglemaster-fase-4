\name: CI/CD - Auth Service

on:
  push:
    branches: [ main ]
    paths: [ 'apps/auth-service/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'apps/auth-service/**' ]

# Permissões necessárias para autenticação na AWS
permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    name: Build, Test & SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/auth-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/auth-service/go.sum

      - name: Go Format & Vet
        run: |
          go fmt ./...
          go vet ./...

      # SAST: Analisa o código-fonte
      - name: Run Trivy SAST
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: './apps/auth-service'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  docker-build-and-push:
    name: Docker Operations
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t auth-service:latest ./apps/auth-service
          # Tag para o ECR
          docker tag auth-service:latest ${{ steps.login-ecr.outputs.registry }}/auth-service:latest

      # Container Scan: Analisa a imagem antes do Push
      - name: Run Trivy Scan on Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'auth-service:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/auth-service:latest