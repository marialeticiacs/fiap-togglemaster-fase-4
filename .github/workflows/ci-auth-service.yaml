name: CI-CD-Auth-Service

on:
  push:
    branches: [ main ]
    paths: [ 'apps/auth-service/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'apps/auth-service/**' ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    name: Build and SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/auth-service/go.sum

      - name: Run Trivy SAST
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: './apps/auth-service'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  docker-ops:
    name: Docker Build and Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build -t auth-service:latest ./apps/auth-service
          docker tag auth-service:latest ${{ steps.login-ecr.outputs.registry }}/auth-service:latest

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'auth-service:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/auth-service:latest