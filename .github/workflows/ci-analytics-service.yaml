name: CI-CD-Analytics-Service
on:
  push:
    branches: [ main ]
    paths: [ 'apps/analytics-service/**' ]
permissions:
  id-token: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Trivy SAST
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: './apps/analytics-service'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build & Tag
        run: |
          docker build -t analytics-service:latest ./apps/analytics-service
          docker tag analytics-service:latest ${{ steps.login-ecr.outputs.registry }}/analytics-service:latest
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'analytics-service:latest'
          exit-code: '1'
          severity: 'CRITICAL'
      - name: Push Image
        run: docker push ${{ steps.login-ecr.outputs.registry }}/analytics-service:latest