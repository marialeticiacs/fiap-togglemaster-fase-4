name: Self Healing Auth Service

on:
  repository_dispatch:
    types: [auth-service-restart]

jobs:
  restart-auth-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Restart auth-service deployment
        run: |
          kubectl rollout restart deployment/auth-service -n default

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-service -n default