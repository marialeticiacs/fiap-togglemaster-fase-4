name: Self Healing Auth Service

on:
  repository_dispatch:
    types: [auth-service-restart]

jobs:
  restart-auth-service:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Test cluster access
        run: |
          kubectl get nodes

      - name: Restart auth-service deployment
        run: |
          kubectl rollout restart deployment/auth-service -n default

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-service -n default